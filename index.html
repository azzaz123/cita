<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0f172a; color:white; font-family:Arial; padding:50px;">
  
  <h1>🧪 Test de Conexión</h1>
  
  <button onclick="probarConexion()" style="padding:20px; font-size:18px; margin:10px;">
    Probar Conexión Supabase
  </button>
  
  <button onclick="probarLogin()" style="padding:20px; font-size:18px; margin:10px;">
    Probar Login
  </button>
  
  <hr>
  
  <h2>Resultados:</h2>
  <pre id="resultados" style="background:#1e293b; padding:20px; border-radius:10px; min-height:200px;">
Esperando...
  </pre>

  <script>
    const SUPABASE_URL = 'https://mburmzxabmrvkehlstxk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idXJtenhhYm1ydmtlaGxzdHhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTk2NDAsImV4cCI6MjA5NTQ5NTY0MH0.9ivUMmRL0EfybZb_Iszx7kxvJfFyVi7whlgQCN-_YzI';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const resultados = document.getElementById('resultados');

    function log(msg) {
      resultados.textContent += '\n' + msg;
      console.log(msg);
    }

    async function probarConexion() {
      resultados.textContent = '🔍 Probando conexión...';
      
      try {
        log('1. Verificando Supabase client...');
        log('   Cliente creado: ' + (supabase ? '✅' : '❌'));
        
        log('2. Probando consulta a admins...');
        const { data, error } = await supabase
          .from('admins')
          .select('*');
        
        if (error) {
          log('   ❌ Error: ' + error.message);
          log('   Detalles: ' + JSON.stringify(error));
        } else {
          log('   ✅ Consulta exitosa');
          log('   Datos: ' + JSON.stringify(data));
          log('   Número de admins: ' + (data ? data.length : 0));
        }
      } catch (e) {
        log('   ❌ Excepción: ' + e.message);
      }
    }

    async function probarLogin() {
      resultados.textContent = '🔐 Probando login...';
      
      try {
        log('1. Buscando admin@citas.com...');
        const { data, error } = await supabase
          .from('admins')
          .select()
          .eq('email', 'admin@citas.com')
          .single();
        
        if (error) {
          log('   ❌ Error: ' + error.message);
          log('   Código: ' + error.code);
          
          if (error.code === 'PGRST116') {
            log('   ⚠️ No existe admin@citas.com en la BD');
            log('   SOLUCIÓN: Ejecuta el SQL en Supabase');
          }
        } else if (data) {
          log('   ✅ Admin encontrado');
          log('   Email: ' + data.email);
          log('   Password hash: ' + data.password_hash);
          
          if (data.password_hash === 'admin') {
            log('   ✅ Contraseña correcta: admin');
            log('   🎉 LOGIN EXITOSO');
          } else {
            log('   ❌ Contraseña incorrecta');
            log('   Esperado: admin');
            log('   Actual: ' + data.password_hash);
          }
        } else {
          log('   ❌ No se encontró ningún admin');
        }
      } catch (e) {
        log('   ❌ Excepción: ' + e.message);
      }
    }

    // Auto-ejecutar al cargar
    window.onload = function() {
      log('🚀 Página cargada');
      log('Supabase URL: ' + SUPABASE_URL);
      log('Cliente: ' + (typeof supabase !== 'undefined' ? '✅ Listo' : '❌ Error'));
    };
  </script>
</body>
</html>
